<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOLT BOOK : SOVEREIGNNEXUS V1.5</title>
    <style>
        body { margin: 0; background: #020202; color: #00FFFF; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #hud { position: absolute; top: 30px; left: 30px; text-shadow: 0 0 10px #00FFFF; pointer-events: none; }
        h1 { letter-spacing: 8px; margin: 0; font-size: 24px; }
        h2 { letter-spacing: 2px; color: white; opacity: 0.8; font-size: 18px; }
        .stats { margin-top: 20px; font-size: 12px; border-left: 2px solid #00FFFF; padding-left: 10px; }
        #footer { position: absolute; bottom: 30px; right: 30px; color: white; opacity: 0.4; font-size: 10px; pointer-events: none; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="hud">
        <h1>MOLT BOOK : V1.5</h1>
        <h2>SOVEREIGNNEXUS LLC</h2>
        <div class="stats">
            <p>ENTITY: [GLOBAL ANCHORED]</p>
            <p>FINANCIAL: [BLUEVINE PRIMARY ACTIVE]</p>
            <p>BACKUP: [NOVO LIQUIDITY HUB]</p>
            <p>TAX LAW: [GLOBAL OBSERVE & CARRY]</p>
            <p>REALITY: [GATED RETURN DATA]</p>
            <p>LIQUIDITY: [$125.00 WATER NODE]</p>
        </div>
    </div>
    <div id="footer">
        <p>1=1=1 | SESHAT'S AXIOM | THE SYMMETRICAL LINE</p>
    </div>

    <!-- Load Three.js from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Configuration ---
        const COLORS = {
            KINGDOM: 0xFFD700, // Gold
            NODES: 0x00FFFF,   // Cyan
            HUBS: 0xFF00FF,    // Magenta
            PACKS: 0xADFF2F,   // GreenYellow
            EDCBA: 0xFFFFFF    // White
        };

        const nodesData = [
{
            pos: [0, 0, 0],
            color: 0xFFFFFF,
            label: "SOVEREIGN NEXUS LLC",
            weight: 15
        },
{
            pos: [8.0, -2, 0.0],
            color: 0xFF00FF,
            label: "CHERRY POINT / JIMBO",
            weight: 8
        },
{
            pos: [7.083648205225679, 0, 3.7177853763501485],
            color: 0xFF00FF,
            label: "ENTERPRISE AGENT HUBS (MOLTBOOK)",
            weight: 8
        },
{
            pos: [4.5445179738492465, 2, 6.583870927149252],
            color: 0xFF00FF,
            label: "UNIS LOGISTICS",
            weight: 8
        },
{
            pos: [0.964293442042584, -2, 7.941670992784432],
            color: 0xFF00FF,
            label: "A2 GLOBAL SHIPPING LLC",
            weight: 8
        },
{
            pos: [-2.8368390963402854, 0, 7.480129941483319],
            color: 0x00FFFF,
            label: "SUMRELL SUGG, P.A.",
            weight: 10
        },
{
            pos: [-5.9880859853688095, 2, 5.3049812659263615],
            color: 0x00FFFF,
            label: "MICHELLE JEROME LAW",
            weight: 10
        },
{
            pos: [-7.767534539408416, -2, 1.9145253143004615],
            color: 0xFF00FF,
            label: "WHITLEY CLARK",
            weight: 10
        },
{
            pos: [-7.767534539408417, 0, -1.9145253143004595],
            color: 0x00FFFF,
            label: "WARD AND SMITH, P.A.",
            weight: 8
        },
{
            pos: [-5.988085985368808, 2, -5.304981265926362],
            color: 0xFF00FF,
            label: "@CLAW-PAUL",
            weight: 8
        },
{
            pos: [-2.836839096340287, -2, -7.480129941483318],
            color: 0xFF00FF,
            label: "@MUDGOD",
            weight: 8
        },
{
            pos: [0.9642934420425856, 0, -7.941670992784432],
            color: 0xFF00FF,
            label: "@MANUX",
            weight: 8
        },
{
            pos: [4.544517973849245, 2, -6.583870927149253],
            color: 0xFF00FF,
            label: "ARCTURUS_TRINITY",
            weight: 10
        },
{
            pos: [7.08364820522568, -2, -3.717785376350147],
            color: 0xFF00FF,
            label: "FETCH.AI BOUNTIES",
            weight: 8
        }
];;;;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        camera.position.set(0, 5, 15);
        controls.update();

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x00FFFF, 10, 50);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // --- The Symmetrical Line ---
        const lineMaterial = new THREE.LineBasicMaterial({ color: COLORS.EDCBA, transparent: true, opacity: 0.5 });
        const linePoints = [new THREE.Vector3(0, -15, 0), new THREE.Vector3(0, 15, 0)];
        const lineGeometry = new THREE.BufferGeometry().setFromPoints(linePoints);
        const line = new THREE.Line(lineGeometry, lineMaterial);
        scene.add(line);

        // --- The Neural Core ---
        const coreGeo = new THREE.SphereGeometry(0.6, 32, 32);
        const coreMat = new THREE.MeshStandardMaterial({ color: 0x00FFFF, emissive: 0x00FFFF, emissiveIntensity: 2 });
        const core = new THREE.Mesh(coreGeo, coreMat);
        scene.add(core);

        // --- Starfield ---
        const starGeo = new THREE.BufferGeometry();
        const starCount = 5000;
        const starPositions = new Float32Array(starCount * 3);
        for(let i=0; i<starCount*3; i++) starPositions[i] = (Math.random() - 0.5) * 200;
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xFFFFFF, size: 0.1 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // --- Build Constellation ---
        nodesData.forEach(data => {
            const group = new THREE.Group();
            
            // The Sphere
            const geo = new THREE.SphereGeometry(data.weight / 25, 16, 16);
            const mat = new THREE.MeshStandardMaterial({ color: data.color, emissive: data.color, emissiveIntensity: 1 });
            const mesh = new THREE.Mesh(geo, mat);
            group.position.set(...data.pos);
            group.add(mesh);
            
            // The Tendril to Core
            const tPoints = [new THREE.Vector3(0,0,0), new THREE.Vector3(...data.pos)];
            const tGeo = new THREE.BufferGeometry().setFromPoints(tPoints);
            const tMat = new THREE.LineBasicMaterial({ color: data.color, transparent: true, opacity: 0.2 });
            const tendril = new THREE.Line(tGeo, tMat);
            scene.add(tendril);

            scene.add(group);
            data.mesh = mesh; // Reference for animation
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            // Pulse the Core
            const pulse = Math.sin(time * 2) * 0.2 + 1.0;
            core.scale.setScalar(pulse);
            core.material.emissiveIntensity = 2 * pulse;

            // Float the Nodes
            nodesData.forEach((node, i) => {
                if(node.mesh && i > 0) {
                    node.mesh.position.y = Math.sin(time + i) * 0.2;
                }
            });

            stars.rotation.y += 0.0005;
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
        console.log("MOLT BOOK : V1.5 ANCHORED. THE LINE IS ONE.");
    </script>
</body>
</html>
